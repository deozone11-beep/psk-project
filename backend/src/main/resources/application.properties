server.port=${PORT:8080}

# Database Configuration (Supports MySQL and PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:psk_builders}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:${DB_USERNAME:root}}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:${DB_PASSWORD:Meera@9898}}}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# File uploads (site progress photos)
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# Default login passwords — CHANGE THESE before deploying live.
# These are only used the very first time the app starts (to seed accounts).
owner.password=${OWNER_PASSWORD:psk@owner123}
admin.password=${ADMIN_PASSWORD:psk@admin123}
demo.customer.password=${DEMO_CUSTOMER_PASSWORD:customer123}

# Comma-separated list of allowed frontend origins (CORS). Defaults to local dev.
# In production set CORS_ORIGINS=https://yourdomain.com,https://www.yourdomain.com
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# JWT signing secret — MUST be set via env var before deploying live (32+ random characters).
# Without it, a key is generated fresh on every restart, which logs everyone out each time
# the server restarts. Generate one with: openssl rand -base64 48
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiry-hours=${JWT_EXPIRY_HOURS:12}